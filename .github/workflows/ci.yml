name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

# Cancel in-flight runs for the same ref on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# NOTE: pymfp and madakit are sibling packages not published to PyPI.
# Each job installs tessera with --no-deps and pins the dev tools directly.
# When the repos are public, replace the install steps with:
#   pip install -e ../mirror-frame-protocol
#   pip install -e ../mada-modelkit
#   pip install -e ".[dev]"
# ---------------------------------------------------------------------------

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools and package
        run: |
          pip install "ruff>=0.4" "mypy>=1.10"
          pip install --no-deps -e .

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy tessera/

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools and package
        run: |
          pip install \
            "pytest>=8.0" "pytest-asyncio>=0.23" \
            "pytest-cov>=4.1" "pytest-xdist>=3.5"
          pip install --no-deps -e .

      - name: Run unit tests
        run: pytest tests/unit/ --cov=tessera --cov-report=term-missing

  integration:
    name: Integration / E2E / Adversarial
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools and package
        run: |
          pip install \
            "pytest>=8.0" "pytest-asyncio>=0.23" \
            "pytest-cov>=4.1" "pytest-xdist>=3.5" \
            "httpx>=0.27"
          pip install --no-deps -e .

      - name: Run integration tests
        run: pytest tests/integration/ tests/e2e/ tests/adversarial/ -q

  benchmarks:
    name: Benchmarks (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools and package
        run: |
          pip install "pytest>=8.0" "pytest-asyncio>=0.23"
          pip install --no-deps -e .

      - name: Run benchmarks
        run: pytest tests/benchmarks/ -q
