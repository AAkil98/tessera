
name: Bug Report
description: Report a bug in Tessera
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

        **If this is a security vulnerability, do NOT open an issue.**
        See [SECURITY.md](https://github.com/Madahub-dev/tessera/blob/main/SECURITY.md) for responsible disclosure.

  - type: input
    id: version
    attributes:
      label: Tessera version
      description: Output of `tessera --version` or `python -c "import tessera; print(tessera.__version__)"`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant log output or traceback.
      render: text
